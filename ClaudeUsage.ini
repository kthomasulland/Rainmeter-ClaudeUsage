[Rainmeter]
Update=100
BackgroundMode=2
SolidColor=0,0,0,1
DynamicWindowSize=1
AccurateText=1

[Metadata]
Name=Claude Code Usage Monitor
Author=Claude
Version=1.0
Information=Monitors Claude Code subscription usage limits

; Include the dynamically generated usage data
@Include=#@#usage-data.inc
@Include2=#@#claude-status.inc

[Variables]
; Scale factor (1.0 = normal, 1.5 = 150%, 2.0 = 200%)
Scale=1.5

; Claude Plan Settings
; PlanName: Display name (Pro, Max 5, Max 20)
; MaxTokens: Token limit per 5-hour window
;   Pro    = 44000
;   Max 5  = 88000
;   Max 20 = 220000
PlanName=Max 5
MaxTokens=88000

; Auto-refresh interval in minutes (default: 5)
RefreshMinutes=5

; Sound alert toggle (1=on, 0=off) - plays notif-01.wav when alert appears
SoundEnabled=1

; Colors
FontColor=255,255,255,255
DimColor=160,160,165,255
AccentColor=255,136,51,255
GreenColor=76,175,80,255
YellowColor=255,193,7,255
RedColor=244,67,54,255
BarBgColor=45,45,50,255
AlertAmberColor=255,170,0,255
AlertRedColor=220,53,34,255
AlertTextColor=255,255,255,255
; Dynamic alert banner color (set by MeasureClaudeAlert; alpha driven by MeasureAlertAlpha)
AlertColorR=0
AlertColorG=0
AlertColorB=0

; Fonts
FontFace=Segoe UI
FontSize=(10*#Scale#)
FontSizeSmall=(9*#Scale#)
FontSizeLarge=(14*#Scale#)

; Layout
Width=(280*#Scale#)
Padding=(15*#Scale#)
BarHeight=(12*#Scale#)
AlertAreaH=66

; ============================================
; MEASURES
; ============================================

[MeasureScript]
Measure=Plugin
Plugin=RunCommand
Program=PowerShell
Parameter=-ExecutionPolicy Bypass -NoProfile -WindowStyle Hidden -File "#@#GetUsage.ps1"
State=Hide
Timeout=30000
FinishAction=[!Log "ClaudeUsage: Script finished, refreshing skin"][!Refresh]
OutputType=ANSI

; Auto-refresh based on RefreshMinutes setting (cycles = minutes × 6)
[MeasureAutoRefresh]
Measure=Calc
Formula=(MeasureAutoRefresh % (#RefreshMinutes# * 6)) + 1
IfCondition=(MeasureAutoRefresh >= (#RefreshMinutes# * 6))
IfTrueAction=[!CommandMeasure MeasureScript "Run"]
DynamicVariables=1
UpdateDivider=100

; Log error status on load (only logs when there's an error)
[MeasureLogError]
Measure=String
String=#UsageError#
IfMatch=^(?!None$).+
IfMatchAction=[!Log "ClaudeUsage ERROR: #UsageError#" Error]
DynamicVariables=1
UpdateDivider=-1

; Calculate 5-hour bar percentage for the bar meter
[MeasureFiveHourBar]
Measure=Calc
Formula=#FiveHourUtil#
MinValue=0
MaxValue=100
DynamicVariables=1
IfCondition=(#FiveHourUtil# < 50)
IfTrueAction=[!SetOption MeterFiveHourBar BarColor "#GreenColor#"][!SetOption MeterFiveHourPercent FontColor "#GreenColor#"][!UpdateMeter MeterFiveHourBar][!UpdateMeter MeterFiveHourPercent]
IfCondition2=(#FiveHourUtil# >= 50) && (#FiveHourUtil# < 80)
IfTrueAction2=[!SetOption MeterFiveHourBar BarColor "#YellowColor#"][!SetOption MeterFiveHourPercent FontColor "#YellowColor#"][!UpdateMeter MeterFiveHourBar][!UpdateMeter MeterFiveHourPercent]
IfCondition3=(#FiveHourUtil# >= 80)
IfTrueAction3=[!SetOption MeterFiveHourBar BarColor "#RedColor#"][!SetOption MeterFiveHourPercent FontColor "#RedColor#"][!UpdateMeter MeterFiveHourBar][!UpdateMeter MeterFiveHourPercent]
UpdateDivider=100

; Calculate 7-day bar percentage
[MeasureSevenDayBar]
Measure=Calc
Formula=#SevenDayUtil#
MinValue=0
MaxValue=100
DynamicVariables=1
IfCondition=(#SevenDayUtil# < 50)
IfTrueAction=[!SetOption MeterSevenDayBar BarColor "#GreenColor#"][!SetOption MeterSevenDayPercent FontColor "#GreenColor#"][!UpdateMeter MeterSevenDayBar][!UpdateMeter MeterSevenDayPercent]
IfCondition2=(#SevenDayUtil# >= 50) && (#SevenDayUtil# < 80)
IfTrueAction2=[!SetOption MeterSevenDayBar BarColor "#YellowColor#"][!SetOption MeterSevenDayPercent FontColor "#YellowColor#"][!UpdateMeter MeterSevenDayBar][!UpdateMeter MeterSevenDayPercent]
IfCondition3=(#SevenDayUtil# >= 80)
IfTrueAction3=[!SetOption MeterSevenDayBar BarColor "#RedColor#"][!SetOption MeterSevenDayPercent FontColor "#RedColor#"][!UpdateMeter MeterSevenDayBar][!UpdateMeter MeterSevenDayPercent]
UpdateDivider=100

; Calculate tokens remaining based on plan's max tokens
[MeasureTokensRemaining]
Measure=Calc
Formula=#MaxTokens# * (1 - #FiveHourUtil# / 100)
DynamicVariables=1
UpdateDivider=100

; Format tokens remaining in K
[MeasureTokensRemainingK]
Measure=Calc
Formula=Round([MeasureTokensRemaining] / 1000, 1)
DynamicVariables=1
UpdateDivider=100

; Dismiss alert -- triggered by clicking the alert banner
[MeasureDismissAlert]
Measure=Plugin
Plugin=RunCommand
Program=PowerShell
Parameter=-ExecutionPolicy Bypass -NoProfile -WindowStyle Hidden -File "#@#ClaudeHook.ps1" -Dismiss
State=Hide
Timeout=10000
FinishAction=[!Refresh]

; --- Pulse animation for alert banner ---
; Frame counter: ticks every 500ms (no UpdateDivider), cycles 0-99
[MeasureAlertBlink]
Measure=Calc
Formula=(MeasureAlertBlink + 1) % 100

; Cosine-based alpha oscillation: smooth 2-second pulse cycle (20 steps at 100ms = 2s)
; - Alert (perm/idle): pulse 80-240 to draw the eye.
; - Working only: steady 200 (informational, no pulse).
; - No banner: alpha=1 (transparent).
[MeasureAlertAlpha]
Measure=Calc
Formula=(#ClaudeAlertCount# > 0 ? Round((Cos(MeasureAlertBlink * 0.31416) + 1) / 2 * 160 + 80) : (#ClaudeBannerCount# > 0 ? 200 : 1))
DynamicVariables=1
NumOfDecimals=0

; Banner show/hide + color logic.
; Visibility is driven by ClaudeBannerCount (perm + idle + working).
; Color is set by alertType: working=blue, idle=amber, permission=red.
; Sound only fires when ClaudeAlertCount > 0 (working state stays silent).
[MeasureClaudeAlert]
Measure=Calc
Formula=#ClaudeBannerCount#
DynamicVariables=1
IfCondition=(#ClaudeBannerCount# > 0)
IfTrueAction=[!ShowMeterGroup AlertGroup][!SetVariable AlertColorR 51][!SetVariable AlertColorG 136][!SetVariable AlertColorB 255]
IfFalseAction=[!HideMeterGroup AlertGroup][!SetVariable AlertColorR 0][!SetVariable AlertColorG 0][!SetVariable AlertColorB 0]
IfCondition2=(#ClaudeIdleCount# > 0)
IfTrueAction2=[!SetVariable AlertColorR 255][!SetVariable AlertColorG 170][!SetVariable AlertColorB 0]
IfCondition3=(#ClaudePermissionCount# > 0)
IfTrueAction3=[!SetVariable AlertColorR 220][!SetVariable AlertColorG 53][!SetVariable AlertColorB 34]
IfCondition4=(#ClaudeAlertCount# > 0)
IfTrueAction4=[!CommandMeasure MeasureAlertSound "Run"][!SetOption MeterAlertIcon Text "[\x26A0]"][!UpdateMeter MeterAlertIcon]
IfCondition5=(#ClaudeAlertCount# = 0) && (#ClaudeWorkingCount# > 0)
IfTrueAction5=[!SetOption MeterAlertIcon Text "[\x29D6]"][!UpdateMeter MeterAlertIcon]

; Drive the sound toggle button appearance and click behavior
[MeasureSoundToggle]
Measure=Calc
Formula=#SoundEnabled#
DynamicVariables=1
IfCondition=(#SoundEnabled# = 1)
IfTrueAction=[!SetOption MeterSoundToggle Text "Sound [\x25C9]"][!SetOption MeterSoundToggle FontColor "#AccentColor#"][!SetOption MeterSoundToggle LeftMouseUpAction """[!WriteKeyValue Variables SoundEnabled 0][!Refresh]"""][!UpdateMeter MeterSoundToggle]
IfFalseAction=[!SetOption MeterSoundToggle Text "Sound [\x25CB]"][!SetOption MeterSoundToggle FontColor "100,100,105,255"][!SetOption MeterSoundToggle LeftMouseUpAction """[!WriteKeyValue Variables SoundEnabled 1][!Refresh]"""][!UpdateMeter MeterSoundToggle]

; Play notif-01.wav when alert transitions to active (only if SoundEnabled=1)
; Uses RunCommand so the sound plays conditionally based on the toggle variable.
[MeasureAlertSound]
Measure=Plugin
Plugin=RunCommand
Program=PowerShell
Parameter=-NoProfile -WindowStyle Hidden -Command "if (#SoundEnabled# -eq 1) { (New-Object Media.SoundPlayer '#@#notif-01.wav').PlaySync() }"
State=Hide
Timeout=10000
DynamicVariables=1

; ============================================
; METERS
; ============================================

; --- Alert Banner Area (above widget body) ---
; Always visible to reserve space for DynamicWindowSize.
; Transparent when no alert; pulsing color when alert is active.
[MeterAlertBannerBg]
Meter=Image
X=0
Y=0
W=(#Width#)
H=(#AlertAreaH#*#Scale#)
SolidColor=#AlertColorR#,#AlertColorG#,#AlertColorB#,[MeasureAlertAlpha]
DynamicVariables=1
LeftMouseUpAction=[!CommandMeasure MeasureDismissAlert "Run"]
ToolTipText=Click to dismiss

[MeterAlertIcon]
Meter=String
X=(#Padding#)
Y=(#AlertAreaH#*#Scale# / 2 - 10*#Scale#)
FontFace=Segoe UI Symbol
FontSize=(14*#Scale#)
FontColor=#AlertTextColor#
AntiAlias=1
Text=[\x26A0]
Group=AlertGroup
Hidden=1
DynamicVariables=1
LeftMouseUpAction=[!CommandMeasure MeasureDismissAlert "Run"]

[MeterAlertText]
Meter=String
X=(6*#Scale#)R
Y=0r
FontFace=#FontFace#
FontSize=(11*#Scale#)
FontWeight=600
FontColor=#AlertTextColor#
AntiAlias=1
Text=#ClaudeAlertText#
DynamicVariables=1
Group=AlertGroup
Hidden=1
LeftMouseUpAction=[!CommandMeasure MeasureDismissAlert "Run"]

; --- Background ---
[MeterBackground]
Meter=Shape
Y=(#AlertAreaH#*#Scale#)
Shape=Rectangle 0,0,(#Width#),(250*#Scale#),(6*#Scale#) | Fill Color 20,20,25,230 | StrokeWidth 0
Shape2=Rectangle 0,0,(#Width#),(60*#Scale#),(6*#Scale#),(6*#Scale#),0,0 | Fill LinearGradient Gradient1 | StrokeWidth 0
Gradient1=90 | 255,136,51,40 ; 0.0 | 20,20,25,0 ; 1.0

; --- Header ---
[MeterIcon]
Meter=String
X=#Padding#
Y=(#AlertAreaH#*#Scale# + #Padding# - 4)
FontFace=Segoe UI Symbol
FontSize=(16*#Scale#)
FontColor=#AccentColor#
AntiAlias=1
Text=[\x2726]
ToolTipText=Claude Code Usage Monitor

[MeterTitle]
Meter=String
X=(6*#Scale#)R
Y=0r
FontFace=#FontFace#
FontSize=#FontSizeLarge#
FontWeight=600
FontColor=#FontColor#
AntiAlias=1
Text=Claude Code

[MeasureMaxTokensK]
Measure=Calc
Formula=#MaxTokens# / 1000
DynamicVariables=1
UpdateDivider=100

[MeterSubtitle]
Meter=String
X=#Padding#
Y=0R
FontFace=#FontFace#
FontSize=#FontSizeSmall#
FontColor=#DimColor#
AntiAlias=1
Text=#PlanName# Plan  |  [MeasureMaxTokensK]k tokens / 5hr
DynamicVariables=1

; --- 5-Hour Window ---
[MeterFiveHourLabel]
Meter=String
X=#Padding#
Y=(12*#Scale#)R
FontFace=#FontFace#
FontSize=#FontSize#
FontWeight=500
FontColor=#FontColor#
AntiAlias=1
Text=5-Hour Window

[MeterFiveHourPercent]
Meter=String
X=(#Width#-#Padding#)
Y=0r
FontFace=#FontFace#
FontSize=#FontSize#
FontWeight=600
FontColor=#GreenColor#
StringAlign=Right
AntiAlias=1
Text=#FiveHourUtil#%
DynamicVariables=1

[MeterFiveHourBarBg]
Meter=Shape
X=#Padding#
Y=(5*#Scale#)R
Shape=Rectangle 0,0,(#Width#-#Padding#*2),#BarHeight#,(4*#Scale#) | Fill Color #BarBgColor# | StrokeWidth 0

[MeterFiveHourBar]
Meter=Bar
MeasureName=MeasureFiveHourBar
X=#Padding#
Y=0r
W=(#Width#-#Padding#*2)
H=#BarHeight#
BarColor=#GreenColor#
SolidColor=0,0,0,1
BarOrientation=Horizontal
DynamicVariables=1

[MeterFiveHourTime]
Meter=String
X=#Padding#
Y=(6*#Scale#)R
FontFace=#FontFace#
FontSize=#FontSizeSmall#
FontColor=#DimColor#
AntiAlias=1
Text=Resets in #FiveHourHrs#h #FiveHourMins#m
DynamicVariables=1

[MeterFiveHourTokens]
Meter=String
X=(#Width#-#Padding#)
Y=0r
FontFace=#FontFace#
FontSize=#FontSizeSmall#
FontColor=#DimColor#
StringAlign=Right
AntiAlias=1
Text=[MeasureTokensRemainingK]k tokens left
DynamicVariables=1

; --- 7-Day Window ---
[MeterSevenDayLabel]
Meter=String
X=#Padding#
Y=(16*#Scale#)R
FontFace=#FontFace#
FontSize=#FontSize#
FontWeight=500
FontColor=#FontColor#
AntiAlias=1
Text=7-Day Window

[MeterSevenDayPercent]
Meter=String
X=(#Width#-#Padding#)
Y=0r
FontFace=#FontFace#
FontSize=#FontSize#
FontWeight=600
FontColor=#GreenColor#
StringAlign=Right
AntiAlias=1
Text=#SevenDayUtil#%
DynamicVariables=1

[MeterSevenDayBarBg]
Meter=Shape
X=#Padding#
Y=(5*#Scale#)R
Shape=Rectangle 0,0,(#Width#-#Padding#*2),#BarHeight#,(4*#Scale#) | Fill Color #BarBgColor# | StrokeWidth 0

[MeterSevenDayBar]
Meter=Bar
MeasureName=MeasureSevenDayBar
X=#Padding#
Y=0r
W=(#Width#-#Padding#*2)
H=#BarHeight#
BarColor=#GreenColor#
SolidColor=0,0,0,1
BarOrientation=Horizontal
DynamicVariables=1

[MeterSevenDayTime]
Meter=String
X=#Padding#
Y=(6*#Scale#)R
FontFace=#FontFace#
FontSize=#FontSizeSmall#
FontColor=#DimColor#
AntiAlias=1
Text=Resets in #SevenDayDays#d #SevenDayHrs#h
DynamicVariables=1

; --- Footer ---
[MeterDivider]
Meter=Shape
X=#Padding#
Y=(14*#Scale#)R
Shape=Rectangle 0,0,(#Width#-#Padding#*2),(1*#Scale#) | Fill Color 60,60,65,255 | StrokeWidth 0

[MeterLastUpdate]
Meter=String
X=#Padding#
Y=(10*#Scale#)R
FontFace=#FontFace#
FontSize=(8*#Scale#)
FontColor=100,100,105,255
AntiAlias=1
Text=Updated: #LastUpdate#
DynamicVariables=1
ToolTipText=Error: #UsageError##CRLF#Click to view log file
LeftMouseUpAction=["#@#usage-log.txt"]

[MeterSoundToggle]
Meter=String
X=(#Width#/2)
Y=0r
FontFace=#FontFace#
FontSize=(8*#Scale#)
FontColor=100,100,105,255
StringAlign=Center
AntiAlias=1
Text=Sound [\x25CB]
DynamicVariables=1
ToolTipText=Toggle alert sound

[MeterRefreshButton]
Meter=String
X=(#Width#-#Padding#)
Y=0r
FontFace=#FontFace#
FontSize=(8*#Scale#)
FontColor=#AccentColor#
StringAlign=Right
AntiAlias=1
Text=Refresh
MouseOverAction=[!SetOption MeterRefreshButton FontColor "255,180,130,255"][!UpdateMeter MeterRefreshButton][!Redraw]
MouseLeaveAction=[!SetOption MeterRefreshButton FontColor #AccentColor#][!UpdateMeter MeterRefreshButton][!Redraw]
LeftMouseUpAction=[!CommandMeasure MeasureScript "Run"][!SetOption MeasureAutoRefresh Formula "1"][!UpdateMeasure MeasureAutoRefresh][!SetOption MeasureAutoRefresh Formula "(MeasureAutoRefresh % (#RefreshMinutes# * 6)) + 1"]

; Bottom padding spacer
[MeterBottomSpacer]
Meter=Image
X=0
Y=(10*#Scale#)R
W=1
H=(5*#Scale#)
SolidColor=0,0,0,1

